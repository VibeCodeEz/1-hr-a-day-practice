<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>DogPhotoApp</title>
    <link rel="stylesheet" href="dog.css">
  </head>
  <body>
    <main>
      <h1>DogPhotoApp</h1>
      <section>
        <h2>Dog Photos</h2>
        <p>Everyone loves <a href="https://cdn.pixabay.com/photo/2016/12/13/05/15/puppy-1903313_640.jpg">cute dogs</a> online!</p>
        <p>See more <a target="_blank" href="https://www.akc.org">dog photos</a> in our gallery.</p>
        <a href="https://www.akc.org"><img src="https://cdn.pixabay.com/photo/2023/08/18/15/02/dog-8198719_640.jpg" alt="A happy golden retriever puppy sitting in grass."></a>
      </section>
      <section>
        <h2>Dog Lists</h2>
        <h3>Things dogs love:</h3>
        <ul>
          <li>belly rubs</li>
          <li>fetch</li>
          <li>peanut butter</li>
        </ul>
        <figure>
          <img src="https://i.ytimg.com/vi/8Aix4RSoABc/mqdefault.jpg" alt="A dog eating peanut butter from a spoon.">
          <figcaption>Dogs <em>love</em> peanut butter.</figcaption>  
        </figure>
        <h3>Top 3 things dogs hate:</h3>
        <ol>
          <li>vacuums</li>
          <li>baths</li>
          <li>loud noises</li>
        </ol>
        <figure>
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRoOjrIlgsv5zZ02ZZwvQ6ovpa5Pjpc3_fcFA&s" alt="A wet dog shaking water off after a bath.">
          <figcaption>Dogs <strong>hate</strong> baths.</figcaption>  
        </figure>
      </section>
    </main>
    <footer>
      <p>
        © 2026 DogPhotoApp - All images from royalty-free sources.
      </p>
    </footer>
  </body>
</html>
